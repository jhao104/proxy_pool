site_name: ProxyPool
site_description: Python爬虫代理IP池
site_author: jhao104
site_url: https://jhao104.github.io/proxy_pool/

repo_name: jhao104/proxy_pool
repo_url: https://github.com/jhao104/proxy_pool

theme:
  name: material
  language: zh
  logo: assets/logo.svg
  favicon: assets/logo.svg
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: light-blue
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: light-blue
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  font:
    text: Noto Sans SC
    code: JetBrains Mono

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - def_list
  - md_in_html
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jhao104/proxy_pool
  generator: false

plugins:
  - search

nav:
  - 首页: index.md
  - 用户指南:
      - 快速开始: getting-started.md
      - 项目结构: project-structure.md
      - 配置参考: configuration.md
      - API 使用: api.md
      - Docker 部署: docker.md
  - 开发指南:
      - 扩展代理源: extending/fetcher.md
      - 扩展校验器: extending/validator.md
  - 变更日志: changelog.md